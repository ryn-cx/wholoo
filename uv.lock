    { name = "get-around" },
    { name = "good-ass-pydantic-integrator" },
]

[package.dev-dependencies]
dev = [
    { name = "mypy" },
    { name = "prek" },
    { name = "pytest" },
    { name = "ruff" },
    { name = "ty" },
]

[package.metadata]
requires-dist = [
    { name = "get-around", git = "https://github.com/ryn-cx/get-around" },
    { name = "good-ass-pydantic-integrator", git = "https://github.com/ryn-cx/good-ass-pydantic-integrator" },
]

[package.metadata.requires-dev]
dev = [
    { name = "mypy", specifier = ">=2.2.0" },
    { name = "prek", specifier = ">=0.4.8" },
    { name = "pytest", specifier = ">=8.4.2" },
    { name = "ruff", specifier = ">=0.13.3" },
    { name = "ty", specifier = ">=0.0.58" },
]
